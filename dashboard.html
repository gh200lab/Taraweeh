<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Collection Dashboard</title>

<style>
body{font-family:system-ui,Arial;max-width:1000px;margin:24px auto;padding:0 12px}
.card{border:1px solid #ddd;border-radius:14px;padding:16px;margin-top:14px}
h1{margin-bottom:6px}
.big{font-size:22px;font-weight:900}
.muted{color:#666}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border-bottom:1px solid #eee;padding:8px;text-align:left}
button{padding:10px 12px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer}
.barWrap{height:14px;border-radius:999px;background:#eee;overflow:hidden;margin-top:8px}
.bar{height:14px;width:0%;background:#111}
</style>
</head>
<body>

<h1>Dashboard</h1>
<p><a href="./index.html">Back to Entry</a></p>

<div class="card">
<div class="muted">Progress to Target</div>
<div class="barWrap"><div class="bar" id="bar"></div></div>
<div class="muted" id="barText" style="margin-top:6px;">—</div>
</div>

<!-- DUPLICATES SECTION -->
<div class="card">
<h3>Residents Duplicates (Tower-Flat)</h3>
<div id="dupSummary" class="muted">Loading...</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Tower-Flat</th>
<th>Count</th>
<th>Names Found</th>
</tr>
</thead>
<tbody id="dupBody"></tbody>
</table>
</div>

<!-- RECENT TRANSACTIONS -->
<div class="card">
<h3>Recent Transactions</h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>ReceiptNo</th>
<th>Tower-Flat</th>
<th>Name</th>
<th>Method</th>
<th>Amount (₹)</th>
</tr>
</thead>
<tbody id="recentBody"></tbody>
</table>
</div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbzdmoQ4-sm-hH4vJlxfNjhaJDQdKjouE4VwuAoKlimVsDCSmMPSwqiwCntXG6Kw1jw/exec";
const fmt=n=>"₹"+(Number(n)||0).toLocaleString("en-IN");

async function loadStats(){
const res=await fetch(GAS_URL+"?action=stats",{cache:"no-store"});
const data=await res.json();
if(!data.ok) throw new Error(data.error||"Failed");


// ===== DUPLICATES RENDERING (THIS WAS MISSING) =====
const duplicates=data.duplicates||[];
const dupSummary=document.getElementById("dupSummary");
const dupBody=document.getElementById("dupBody");

if(duplicates.length===0){
dupSummary.textContent="No duplicates found ✅";
dupBody.innerHTML=`<tr><td colspan="4" class="muted">No duplicate Tower-Flat entries</td></tr>`;
}else{
dupSummary.textContent=`Duplicates found: ${duplicates.length}`;
dupBody.innerHTML=duplicates.map((d,i)=>`
<tr>
<td>${i+1}</td>
<td>${d.key}</td>
<td>${d.count}</td>
<td>${(d.names||[]).join(", ")}</td>
</tr>
`).join("");
}


// ===== PROGRESS BAR =====
const pct=Math.max(0,Math.min(100,Number(data.progressPct||0)));
document.getElementById("bar").style.width=pct+"%";
document.getElementById("barText").textContent=
`Collected ${fmt(data.total)} / ${fmt(data.target)} (${pct}%)`;


// ===== RECENT TRANSACTIONS =====
const recent=data.recent||[];
document.getElementById("recentBody").innerHTML=recent.map(r=>`
<tr>
<td>${new Date(r.timestamp).toLocaleString()}</td>
<td>${r.receiptNo||""}</td>
<td>${r.tower}-${r.flat}</td>
<td>${r.name}</td>
<td>${r.method}</td>
<td>${fmt(r.amount)}</td>
</tr>
`).join("");
}

loadStats().catch(e=>alert(e.message||e));
setInterval(()=>loadStats().catch(()=>{}),30000);
</script>

</body>
</html>
