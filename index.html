<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Taraweeh 2026 Collection</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 860px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 16px; margin-top: 12px; }
    label { display:block; margin-top: 10px; font-weight: 700; }
    input, select { width: 100%; padding: 10px; border:1px solid #ccc; border-radius: 12px; margin-top: 6px; }
    button { margin-top: 14px; padding: 12px 14px; border: 0; border-radius: 12px; cursor:pointer; background:#111; color:#fff; }
    button.secondary { background:#eee; color:#111; border:1px solid #ddd; }
    button:disabled { opacity: .6; cursor:not-allowed; }
    .ok { color: #0a7; font-weight: 800; }
    .err { color: #c00; font-weight: 800; }
    .receiptBox { display:none; margin-top:12px; padding:12px; border:1px solid #ddd; border-radius:14px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    a.btn { background:#111; color:#fff; text-decoration:none; padding:10px 12px; border-radius:12px; display:inline-block; }
    .muted { color:#666; }
  </style>

  <!-- jsPDF for PDF receipts -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>

<h1>Taraweeh 2026 Collection</h1>
<p><a href="./dashboard.html">Open Dashboard</a></p>

<div class="card">
  <label>Tower</label>
  <select id="tower"></select>

  <label>Flat</label>
  <select id="flat"></select>

  <label>Name</label>
  <input id="name" readonly />

  <label>Phone (WhatsApp)</label>
  <input id="phone" placeholder="Example: 91XXXXXXXXXX" />

  <label>Amount (₹)</label>
  <input id="amount" type="number" min="1" />

  <label>Method</label>
  <select id="method">
    <option value="UPI">UPI</option>
    <option value="Cash">Cash</option>
  </select>

  <label>UPI Txn Ref (optional)</label>
  <input id="txnRef" />

  <label>Collector</label>
  <input id="collector" />

  <label>Notes</label>
  <input id="notes" />

  <button id="submit">Save Collection</button>
  <p id="msg"></p>

  <div id="receiptBox" class="receiptBox">
    <b>Receipt Generated</b>
    <div class="muted" id="receiptMeta" style="margin-top:6px;"></div>
    <pre id="receiptPreview" style="white-space:pre-wrap;margin-top:8px;margin-bottom:0;"></pre>

    <div class="actions">
      <a id="waSend" class="btn" href="#" target="_blank" rel="noopener">Send WhatsApp Receipt</a>
      <button id="downloadPdf" class="secondary" type="button">Download PDF</button>
      <button id="copyReceipt" class="secondary" type="button">Copy Receipt</button>
    </div>

    <small class="muted">WhatsApp opens with the message ready (manual send).</small>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzdmoQ4-sm-hH4vJlxfNjhaJDQdKjouE4VwuAoKlimVsDCSmMPSwqiwCntXG6Kw1jw/exec";

  // UPI (optional usage in your other UI if needed later)
  const UPI_ID = "yourupi@bank";
  const PAYEE_NAME = "Taraweeh Fund";

  const RECEIPT_FUND_NAME = "Taraweeh 2026";
  const RECEIPT_MESSAGE =
`JazakAllah Khair (جزاك اللهُ خيراً)
Thank you for your contribution for Taraweeh 2026

Regards,
Akram Khan
Your brothers from Global Hillview Apartments, Sec-11, Sohna, Gurgaon-122103
Mob: 9958277484`;

  let residents = [];
  let lastReceiptText = "";
  let lastReceiptNo = "";

  const towerEl = document.getElementById("tower");
  const flatEl = document.getElementById("flat");
  const nameEl = document.getElementById("name");
  const phoneEl = document.getElementById("phone");
  const amountEl = document.getElementById("amount");
  const methodEl = document.getElementById("method");
  const txnRefEl = document.getElementById("txnRef");
  const collectorEl = document.getElementById("collector");
  const notesEl = document.getElementById("notes");
  const submitBtn = document.getElementById("submit");
  const msgEl = document.getElementById("msg");

  const receiptBox = document.getElementById("receiptBox");
  const receiptPreview = document.getElementById("receiptPreview");
  const receiptMeta = document.getElementById("receiptMeta");
  const waSend = document.getElementById("waSend");
  const copyReceiptBtn = document.getElementById("copyReceipt");
  const downloadPdfBtn = document.getElementById("downloadPdf");

  function setMsg(text, ok=true) {
    msgEl.className = ok ? "ok" : "err";
    msgEl.textContent = text;
  }

  function normalizePhoneForWa(phone) {
    return String(phone || "").replace(/\D/g, "");
  }

  async function loadResidents() {
    const r = await fetch(`${GAS_URL}?action=residents`, { cache: "no-store" });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || "Failed to load residents");

    residents = d.residents || [];
    const towers = [...new Set(residents.map(x => x.tower))].sort((a,b)=> (Number(a)||0)-(Number(b)||0));
    towerEl.innerHTML = towers.map(t => `<option value="${t}">${t}</option>`).join("");
    populateFlats();
  }

  function populateFlats() {
    const t = towerEl.value;
    const flats = residents.filter(r => r.tower === t).map(r => r.flat).sort((a,b)=> (Number(a)||0)-(Number(b)||0));
    flatEl.innerHTML = flats.map(f => `<option value="${f}">${f}</option>`).join("");
    fillNamePhone();
    receiptBox.style.display = "none";
  }

  function fillNamePhone() {
    const t = towerEl.value;
    const f = flatEl.value;
    const r = residents.find(x => x.tower === t && x.flat === f);
    if (r) {
      nameEl.value = r.name || "";
      if (r.phone) phoneEl.value = r.phone;
    }
  }

  function buildReceiptText({ receiptNo, tower, flat, name, amount, method, txnRef }) {
    const when = new Date().toLocaleString();
    const amt = `₹${Number(amount||0).toLocaleString("en-IN")}`;
    const ref = txnRef ? ` (Ref: ${txnRef})` : "";

    return [
      `🧾 Receipt: ${RECEIPT_FUND_NAME}`,
      `Receipt No: ${receiptNo}`,
      `Date: ${when}`,
      `Flat: ${tower}-${flat}`,
      `Name: ${name}`,
      `Amount: ${amt}`,
      `Mode: ${method}${ref}`,
      "--------------------------------",
      RECEIPT_MESSAGE
    ].join("\n");
  }

  function showReceipt(payload, receiptNo) {
    const receiptText = buildReceiptText({
      receiptNo,
      tower: payload.tower,
      flat: payload.flat,
      name: payload.name,
      amount: payload.amount,
      method: payload.method,
      txnRef: payload.txnRef
    });

    lastReceiptText = receiptText;
    lastReceiptNo = receiptNo;

    receiptMeta.textContent = `Receipt No: ${receiptNo}`;
    receiptPreview.textContent = receiptText;

    const phone = normalizePhoneForWa(phoneEl.value);
    const waUrl = phone
      ? `https://wa.me/${phone}?text=${encodeURIComponent(receiptText)}`
      : `https://wa.me/?text=${encodeURIComponent(receiptText)}`;

    waSend.href = waUrl;

    copyReceiptBtn.onclick = async () => {
      await navigator.clipboard.writeText(receiptText);
      setMsg("Receipt copied ✅", true);
    };

    downloadPdfBtn.onclick = () => downloadReceiptPdf(receiptNo, receiptText);

    receiptBox.style.display = "block";
  }

  function downloadReceiptPdf(receiptNo, receiptText) {
    // jsPDF in UMD: window.jspdf.jsPDF
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });

    const margin = 40;
    let y = 50;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text("Payment Receipt", margin, y);
    y += 22;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Receipt No: ${receiptNo}`, margin, y);
    y += 18;

    // Body text (wrapped)
    const body = receiptText;
    const lines = doc.splitTextToSize(body, 515); // roughly A4 width minus margins

    y += 8;
    doc.setFontSize(10);
    doc.text(lines, margin, y);

    const safeNo = String(receiptNo || "receipt").replace(/[^a-zA-Z0-9_-]/g, "_");
    doc.save(`${safeNo}.pdf`);
  }

  async function saveCollection() {
    const payload = {
      action: "addCollection",
      tower: towerEl.value,
      flat: flatEl.value,
      name: nameEl.value,
      amount: Number(amountEl.value),
      method: methodEl.value,
      txnRef: txnRefEl.value,
      collector: collectorEl.value,
      notes: notesEl.value
    };

    if (!payload.amount || payload.amount <= 0) throw new Error("Enter a valid amount");
    if (!payload.name) throw new Error("Name is empty");

    const resp = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    const text = await resp.text();
    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error("Server returned non-JSON: " + text.slice(0,150)); }

    if (!data.ok) throw new Error(data.error || "Save failed");
    if (!data.receiptNo) throw new Error("ReceiptNo missing from server response");

    return { payload, receiptNo: data.receiptNo };
  }

  submitBtn.addEventListener("click", async () => {
    submitBtn.disabled = true;
    const old = submitBtn.textContent;
    submitBtn.textContent = "Saving...";
    setMsg("");

    try {
      const { payload, receiptNo } = await saveCollection();
      setMsg("Saved ✅", true);
      showReceipt(payload, receiptNo);

      // clear only entry fields (keep phone/collector for convenience)
      amountEl.value = "";
      txnRefEl.value = "";
      notesEl.value = "";
    } catch (e) {
      setMsg(String(e.message || e), false);
    }

    submitBtn.disabled = false;
    submitBtn.textContent = old;
  });

  towerEl.addEventListener("change", populateFlats);
  flatEl.addEventListener("change", fillNamePhone);

  loadResidents().catch(err => setMsg(err.message || err, false));
</script>

</body>
</html>
