<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Residents Collection</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 860px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 16px; margin-top: 12px; }
    label { display:block; margin-top: 10px; font-weight: 700; }
    input, select { width: 100%; padding: 10px; border:1px solid #ccc; border-radius: 12px; margin-top: 6px; }
    button { margin-top: 14px; padding: 12px 14px; border: 0; border-radius: 12px; cursor:pointer; background:#111; color:#fff; }
    button.secondary { background:#eee; color:#111; border:1px solid #ddd; }
    button:disabled { opacity: .6; cursor:not-allowed; }
    .row { display:flex; gap: 12px; }
    .row > div { flex:1; }
    .ok { color: #0a7; font-weight: 800; }
    .err { color: #c00; font-weight: 800; }
    small, .muted { color: #666; }
    a.btn { background:#111; color:#fff; text-decoration:none; padding:10px 12px; border-radius:12px; display:inline-block; }

    .warnBox{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid #f3d36b;
      background:#fff7d6;
      color:#6b4e00;
      display:none;
      font-weight:700;
    }
    .warnBox small{ display:block; font-weight:600; margin-top:6px; color:#6b4e00; }

    @media (max-width: 760px) { .row { flex-direction: column; } }
  </style>
</head>
<body>
  <h1>Collection Entry</h1>
  <p><a href="./dashboard.html">Open Dashboard</a></p>

  <div class="card">
    <div class="row">
      <div>
        <label>Tower</label>
        <select id="tower"></select>
      </div>
      <div>
        <label>Flat</label>
        <select id="flat"></select>
      </div>
    </div>

    <label>Name</label>
    <input id="name" placeholder="Auto-filled" readonly />

    <!-- NEW: Duplicate warning -->
    <div id="dupWarn" class="warnBox"></div>

    <label>Amount (₹)</label>
    <input id="amount" type="number" min="1" placeholder="e.g. 500" />

    <label>Method</label>
    <select id="method">
      <option value="UPI">UPI</option>
      <option value="Cash">Cash</option>
    </select>

    <label>UPI Txn Ref (optional)</label>
    <input id="txnRef" placeholder="Reference number" />

    <label>Collector (optional)</label>
    <input id="collector" placeholder="Name" />

    <label>Notes (optional)</label>
    <input id="notes" placeholder="Any note" />

    <button id="submit">Save Collection</button>
    <p id="msg"></p>
    <small>Tip: If warning shows, correct the Residents master so Tower-Flat is unique.</small>
  </div>

  <div class="card">
    <h3 style="margin:0 0 6px;">Pay via UPI</h3>
    <div class="row">
      <div style="flex:0 0 180px;">
        <img id="qr" alt="UPI QR" style="width:180px;height:180px;border:1px solid #ddd;border-radius:14px;" />
      </div>
      <div>
        <div><b>UPI ID:</b> <span id="upiIdTxt"></span></div>
        <div class="muted" style="margin-top:6px;">Scan QR or use shortcuts (mobile)</div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">
          <a id="btnUPI" class="btn" href="#">Open UPI</a>
          <a id="btnGPay" class="btn" href="#">Google Pay</a>
          <a id="btnPhonePe" class="btn" href="#">PhonePe</a>
          <a id="btnPaytm" class="btn" href="#">Paytm</a>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">
          <button id="copyUpi" class="secondary" type="button">Copy UPI ID</button>
          <button id="copyLink" class="secondary" type="button">Copy UPI Link</button>
        </div>

        <small class="muted">Note: App shortcuts depend on phone/browser. “Open UPI” is most reliable.</small>
      </div>
    </div>
  </div>

<script>
  // ========= CONFIG =========
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzdmoQ4-sm-hH4vJlxfNjhaJDQdKjouE4VwuAoKlimVsDCSmMPSwqiwCntXG6Kw1jw/exec";

  // CHANGE THESE:
  const UPI_ID = "yourupi@bank";
  const PAYEE_NAME = "Taraweeh Fund";
  // ==========================

  let residents = [];

  // NEW: duplicates map => key "tower-flat" -> {count, names[]}
  const dupMap = new Map();

  const towerEl = document.getElementById("tower");
  const flatEl = document.getElementById("flat");
  const nameEl = document.getElementById("name");
  const msgEl = document.getElementById("msg");
  const amtEl = document.getElementById("amount");
  const submitBtn = document.getElementById("submit");
  const dupWarnEl = document.getElementById("dupWarn");

  function setMsg(text, ok=true) {
    msgEl.className = ok ? "ok" : "err";
    msgEl.textContent = text;
  }

  function unique(arr) { return [...new Set(arr)]; }

  function populateTowers() {
    const towers = unique(residents.map(r => r.tower))
      .sort((a,b)=> (Number(a)||0) - (Number(b)||0));
    towerEl.innerHTML = towers.map(t => `<option value="${t}">${t}</option>`).join("");
    populateFlats();
  }

  function populateFlats() {
    const t = towerEl.value;
    const flats = residents.filter(r => r.tower === t).map(r => r.flat)
      .sort((a,b)=> (Number(a)||0) - (Number(b)||0));
    flatEl.innerHTML = flats.map(f => `<option value="${f}">${f}</option>`).join("");
    fillNameAndDupWarn();
  }

  function fillNameAndDupWarn() {
    const t = towerEl.value;
    const f = flatEl.value;
    const key = `${t}-${f}`;

    // Name (auto-fill first match)
    const r = residents.find(x => x.tower === t && x.flat === f);
    nameEl.value = r ? r.name : "";

    // NEW: Duplicate warning
    const d = dupMap.get(key);
    if (d && d.count > 1) {
      const names = (d.names || []).filter(Boolean);
      dupWarnEl.style.display = "block";
      dupWarnEl.innerHTML =
        `⚠ Duplicate in Residents for <b>${key}</b> (Count: ${d.count}).` +
        `<small>Names found: ${names.length ? names.join(", ") : "-"}</small>` +
        `<small>Door-to-door tip: confirm correct name and fix Residents master.</small>`;
    } else {
      dupWarnEl.style.display = "none";
      dupWarnEl.textContent = "";
    }
  }

  async function loadResidents() {
    const res = await fetch(`${GAS_URL}?action=residents`, { cache: "no-store" });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Failed to load residents");
    residents = data.residents || [];
    if (!residents.length) throw new Error("No residents found");
    populateTowers();
  }

  // NEW: Load duplicates once (from stats endpoint)
  async function loadDuplicates() {
    const res = await fetch(`${GAS_URL}?action=stats`, { cache: "no-store" });
    const data = await res.json();
    if (!data.ok) return;

    const dups = data.duplicates || [];
    dupMap.clear();
    dups.forEach(d => {
      dupMap.set(String(d.key), { count: Number(d.count || 0), names: d.names || [] });
    });
  }

  async function addCollection() {
    const payload = {
      action: "addCollection",
      tower: towerEl.value,
      flat: flatEl.value,
      name: nameEl.value,
      amount: Number(document.getElementById("amount").value),
      method: document.getElementById("method").value,
      txnRef: document.getElementById("txnRef").value,
      collector: document.getElementById("collector").value,
      notes: document.getElementById("notes").value
    };

    if (!payload.amount || payload.amount <= 0) throw new Error("Enter a valid amount");

    // IMPORTANT: CORS-safe
    const resp = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    const text = await resp.text();
    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error("Server returned non-JSON: " + text.slice(0, 150)); }
    if (!data.ok) throw new Error(data.error || "Save failed");

    // reset fields
    document.getElementById("amount").value = "";
    document.getElementById("txnRef").value = "";
    document.getElementById("notes").value = "";
    setUpiLinks();
  }

  submitBtn.addEventListener("click", async () => {
    submitBtn.disabled = true;
    const old = submitBtn.textContent;
    submitBtn.textContent = "Saving...";
    setMsg("", true);

    try {
      await addCollection();
      setMsg("Saved ✅", true);
    } catch (e) {
      setMsg(String(e.message || e), false);
    }

    submitBtn.disabled = false;
    submitBtn.textContent = old;
  });

  towerEl.addEventListener("change", populateFlats);
  flatEl.addEventListener("change", fillNameAndDupWarn);

  // ===== UPI QR + SHORTCUTS =====
  const qrEl = document.getElementById("qr");
  const upiIdTxt = document.getElementById("upiIdTxt");
  upiIdTxt.textContent = UPI_ID;

  function buildUpiUri(amount) {
    const params = new URLSearchParams({ pa: UPI_ID, pn: PAYEE_NAME, cu: "INR" });
    if (amount && amount > 0) params.set("am", String(amount));
    return `upi://pay?${params.toString()}`;
  }

  function setUpiLinks() {
    const amount = Number(amtEl.value) || 0;
    const upiUri = buildUpiUri(amount);

    qrEl.src = "https://chart.googleapis.com/chart?cht=qr&chs=300x300&chl=" + encodeURIComponent(upiUri);

    document.getElementById("btnUPI").href = upiUri;
    const query = upiUri.split("?")[1] || "";
    document.getElementById("btnGPay").href = "gpay://upi/pay?" + query;
    document.getElementById("btnPhonePe").href = "phonepe://pay?" + query;
    document.getElementById("btnPaytm").href = "paytmmp://pay?" + query;
  }

  document.getElementById("copyUpi").addEventListener("click", async () => {
    await navigator.clipboard.writeText(UPI_ID);
    setMsg("UPI ID copied ✅", true);
  });

  document.getElementById("copyLink").addEventListener("click", async () => {
    const amount = Number(amtEl.value) || 0;
    await navigator.clipboard.writeText(buildUpiUri(amount));
    setMsg("UPI link copied ✅", true);
  });

  amtEl.addEventListener("input", setUpiLinks);

  // Init
  (async function init() {
    try {
      setUpiLinks();
      await loadDuplicates();  // NEW: duplicates first
      await loadResidents();   // then residents
      fillNameAndDupWarn();    // ensure warning reflects current selection
    } catch (e) {
      setMsg(String(e.message || e), false);
    }
  })();
</script>
</body>
</html>
